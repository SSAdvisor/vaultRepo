version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        # Pass variables from the local .env into the build stage
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "8080:80"
    env_file:
      - .env
    restart: unless-stopped
    container_name: vaultrepo_web
